syntax = "proto3";
package auth;

service AuthService {
	rpc Register(UserRegisterRequest) returns (AuthResponse);
	rpc Login(AuthRequest) returns (AuthResponse);
	rpc GetUser(UserRequest) returns (UserResponse);
}

message UserRegisterRequest {
	string name = 1;
	string email = 2;
	string password = 3;
}

message AuthRequest {
	string email = 1;
	string password = 2;
}

message UserRequest {
	string id = 1;
}

message UserResponse {
	string id = 1;
	string name = 2;
	string email = 3;
	string role = 4;
}

message AuthResponse {
	bool success = 1;
	string message = 2;
	UserResponse user = 3;
}

