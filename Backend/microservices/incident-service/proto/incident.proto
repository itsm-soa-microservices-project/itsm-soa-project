syntax = "proto3";
package incident;

service IncidentService {
	rpc CreateIncident(IncidentCreateRequest) returns (IncidentResponse);
	rpc GetIncident(GetRequest) returns (IncidentResponse);
	rpc ListIncidents(Empty) returns (IncidentList);
}

message IncidentCreateRequest {
	string title = 1;
	string description = 2;
	string reporterId = 3;
	string status = 4;
}

message GetRequest {
	string id = 1;
}

message IncidentResponse {
	string id = 1;
	string title = 2;
	string description = 3;
	string reporterId = 4;
	string status = 5;
	string createdAt = 6;
}

message IncidentList {
	repeated IncidentResponse incidents = 1;
}

message Empty {}

