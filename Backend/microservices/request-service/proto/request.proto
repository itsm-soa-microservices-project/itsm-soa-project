syntax = "proto3";
package request;

service RequestService {
	rpc CreateRequest(RequestCreateRequest) returns (RequestResponse);
	rpc GetRequest(GetRequest) returns (RequestResponse);
	rpc ListRequests(Empty) returns (RequestList);
}

message RequestCreateRequest {
	string title = 1;
	string description = 2;
	string requesterId = 3;
	string status = 4;
}

message GetRequest {
	string id = 1;
}

message RequestResponse {
	string id = 1;
	string title = 2;
	string description = 3;
	string requesterId = 4;
	string status = 5;
	string createdAt = 6;
}

message RequestList {
	repeated RequestResponse requests = 1;
}

message Empty {}

